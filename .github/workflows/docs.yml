name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "**/*.md"
      - "scripts/check-doc-links.ts"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "**/*.md"
      - "scripts/check-doc-links.ts"

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Doc link check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check doc links
        run: pnpm docs:check

      - name: Fee-docs guard
        run: pnpm check:fee-docs
