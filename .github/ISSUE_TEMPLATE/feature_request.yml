name: Feature request
description: Suggest an enhancement for HISS Finance.
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: input
    id: area
    attributes:
      label: Area
      placeholder: "packages/, schemas/, contracts/, examples/, docs/, scripts/"
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This request concerns the public open-source surface only (no private infrastructure).
          required: true
