name: Bug report
description: Report a defect in HISS Finance packages, schemas, ABIs, or examples.
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do not include secrets, private keys,
        seed phrases, or credentials of any kind.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I run ..., I get ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, reproducible steps. Include commands where possible.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Affected package or area
      placeholder: "@hiss/... , schemas/, contracts/abi, examples/, scripts/"
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, pnpm version, OS.
      placeholder: |
        node -v:
        pnpm -v:
        OS:
    validations:
      required: false
  - type: checkboxes
    id: hygiene
    attributes:
      label: Confirmation
      options:
        - label: This report contains no secrets, private keys, or credentials.
          required: true
